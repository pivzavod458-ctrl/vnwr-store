<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Магазин одежды</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #fff; }
    body { --side-visible: 64px; }
    body.side-collapsed { --side-visible: 10px; }
    #store { display: block; width: calc(100% - var(--side-visible)); height: 100%; border: 0; background: #fff; transition: width .32s cubic-bezier(.2,.8,.2,1); }
    body.is-dragging #store { transition: none; }
    #side-header { position: fixed; z-index: 20; inset: 0 0 0 auto; width: 64px; display: flex; flex-direction: column; align-items: center; gap: 12px; padding-top: 16px; box-sizing: border-box; background: #fff; border-left: 1px solid #eaecee; box-shadow: -8px 0 24px rgba(0,0,0,0); transform: translateX(0); transition: transform .32s cubic-bezier(.2,.8,.2,1), box-shadow .32s ease; touch-action: none; }
    #side-header.is-dragging { transition: none; }
    body.side-collapsed #side-header { transform: translateX(54px); box-shadow: -8px 0 24px rgba(0,0,0,.08); }
    #side-grip { position: absolute; top: 50%; left: -17px; width: 17px; height: 64px; display: grid; place-items: center; border: 0; border-radius: 12px 0 0 12px; background: #fff; box-shadow: -5px 0 12px rgba(0,0,0,.06); cursor: ew-resize; transform: translateY(-50%); }
    #side-grip::before { content: ''; width: 3px; height: 20px; border-radius: 3px; background: #c9cdd2; box-shadow: 0 6px 0 #c9cdd2, 0 -6px 0 #c9cdd2; }
    .side-button { display: grid; place-items: center; flex: 0 0 auto; width: 40px; height: 40px; padding: 0; border: 0; border-radius: 10px; background: transparent; cursor: pointer; }
    .side-button:active { background: rgba(0,0,0,.08); transform: scale(.95); }
    .side-button svg { width: 24px; height: 24px; stroke: #222; stroke-width: 2; fill: none; stroke-linecap: round; }
    #side-menu { order: 1; }
    #side-search { order: 2; }
    #side-chat { order: 3; width: 40px; height: 40px; margin-top: auto; margin-bottom: 18px; border-radius: 10px; background: transparent; box-shadow: none; }
    #side-chat:active { background: rgba(0,0,0,.08); }
    #side-chat svg { width: 36px; height: 36px; fill: #222; stroke: none; }
    #header-hint {
      position: fixed; z-index: 10; top: 0; left: 24px; right: 128px; height: 58px;
      display: flex; align-items: center; overflow: hidden;
      background: #fff; color: transparent;
      white-space: nowrap; transition: opacity .2s ease;
      pointer-events: none;
    }
    #search-trigger, #search-panel, #search-empty { display: none !important; }
    #search-panel {
      position: fixed; z-index: 13; top: 0; left: 16px; right: 64px; height: 58px;
      display: flex; align-items: center; gap: 8px; padding: 0 0 0 8px; box-sizing: border-box;
      background: #fff; opacity: 0; pointer-events: none; transform: scaleX(.06);
      transform-origin: right center; transition: opacity .18s ease, transform .24s cubic-bezier(.2,.8,.2,1);
    }
    #search-panel.is-open { opacity: 1; pointer-events: auto; transform: scaleX(1); }
    #search-input { flex: 1; min-width: 0; height: 36px; padding: 0 8px; border: 0; color: #000; font: 700 15px/24px "Factor A", Arial, sans-serif; outline: 0; }
    #search-close { width: 42px; height: 42px; border: 0; border-radius: 50%; background: transparent; color: #333; font: 700 28px/36px Arial, sans-serif; cursor: pointer; transform: rotate(180deg); }
    #search-empty { position: fixed; z-index: 13; top: 62px; left: 16px; right: 64px; display: none; padding: 12px 16px; border-radius: 10px; background: #fff; box-shadow: 0 8px 20px rgba(0,0,0,.12); color: rgba(0,0,0,.6); font: 400 15px/24px "Factor A", Arial, sans-serif; }
    #search-empty.is-visible { display: block; }
    /* Верхняя панель вместо боковой */
    #store { width: 100%; height: calc(100% - 64px); margin-top: 64px; transition: none; }
    #side-header { inset: 0 0 auto 0; width: 100%; height: 64px; display: flex; flex-direction: row; justify-content: flex-end; align-items: center; gap: 2px; padding: 0 12px; border-left: 0; border-bottom: 1px solid #eaecee; box-shadow: 0 2px 12px rgba(0,0,0,.03); touch-action: auto; transform: none !important; }
    #side-grip { display: none; }
    #side-menu, #side-search { order: initial; display: grid; place-items: center; width: 42px; height: 42px; margin: 0; padding: 0; border-radius: 10px; background: transparent; }
    #side-menu svg, #side-search svg, #side-chat svg { width: 24px; height: 24px; stroke: #222; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    #side-chat svg { width: 22px; height: 22px; fill: none; stroke: #222; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    #side-menu img, #side-search img, #side-chat img { display: block; width: 24px; height: 24px; object-fit: contain; }
    /* У лупы ручка, а у чата хвостик расположены снизу. Сдвиг компенсирует
       их оптический центр: круг лупы, средняя полоса меню и тело чата — на одной оси. */
    #side-search img { transform: none; }
    #side-chat img { width: 23px; height: 23px; filter: brightness(.76) contrast(1.25) drop-shadow(0 0 .38px #222); }
    /* У исходных файлов разная прозрачная рамка. Эти размеры дают чату
       ту же ВИДИМУЮ площадь (19 × 20px), что и у лупы, без смещения центра. */
    #side-chat .vnwr-header-chat { display: block; width: 22.5px; height: 25.5px; object-fit: fill; transform: translateY(3px); filter: none; }
    #side-chat svg.vnwr-chat-icon .chat-lines { fill: none; stroke: #fff; stroke-width: 1.6; stroke-linecap: round; }
    #side-chat svg { display: block; width: 26px; height: 26px; fill: none; stroke: #222; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    #floating-chat { position: fixed; z-index: 30; right: 18px; bottom: 24px; display: grid; place-items: center; width: 58px; height: 58px; padding: 0; border: 0; border-radius: 50%; background: #000; box-shadow: 0 8px 18px rgba(0,0,0,.19); cursor: grab; touch-action: none; user-select: none; -webkit-user-select: none; transition: opacity .22s ease, transform .22s ease; }
    #floating-chat:active, #floating-chat.is-dragging { cursor: grabbing; transform: scale(.96); }
    #floating-chat.is-returning { transition: left .46s cubic-bezier(.2,.85,.25,1), top .46s cubic-bezier(.2,.85,.25,1), transform .18s ease; }
    #floating-chat.is-hidden { opacity: 0; pointer-events: none; transform: scale(.78); }
    #floating-chat img { display: block; width: 26px; height: 26px; object-fit: contain; filter: brightness(0) invert(1); pointer-events: none; }
    #header-hint, #search-panel, #search-empty { display: none !important; }
    #app-loader { position: fixed; z-index: 100; inset: 0; display: grid; place-items: center; background: #fff; opacity: 1; transition: opacity .34s ease, visibility .34s step-end; }
    #app-loader__mark { display: flex; gap: 5px; align-items: flex-end; height: 30px; }
    #app-loader__mark i { display: block; width: 5px; border-radius: 4px; background: #222; animation: loader-bar .72s ease-in-out infinite alternate; }
    #app-loader__mark i:nth-child(1) { height: 13px; animation-delay: -.28s; }
    #app-loader__mark i:nth-child(2) { height: 22px; animation-delay: -.14s; }
    #app-loader__mark i:nth-child(3) { height: 30px; }
    @keyframes loader-bar { to { transform: scaleY(.52); opacity: .55; } }
    body.is-ready #app-loader { opacity: 0; pointer-events: none; visibility: hidden; }
  </style>
</head>
<body>
  <div id="app-loader" aria-label="Загрузка"><span id="app-loader__mark" aria-hidden="true"><i></i><i></i><i></i></span></div>
  <div id="header-hint">Для удобства, воспользуйтесь поиском:</div>
  <button id="search-trigger" type="button" aria-label="Открыть поиск"></button>
  <form id="search-panel" role="search"><input id="search-input" type="search" placeholder="Поиск" autocomplete="off"><button id="search-close" type="button" aria-label="Закрыть поиск">›</button></form>
  <div id="search-empty">Не найдено</div>
  <nav id="side-header" aria-label="Навигация">
    <button id="side-grip" type="button" aria-label="Потянуть панель"></button>
    <button id="side-search" class="side-button" type="button" aria-label="Открыть поиск"><img src="poisk.webp" alt=""></button>
    <button id="side-menu" class="side-button" type="button" aria-label="Меню"><img src="tripoloski.webp" alt=""></button>
  </nav>
  <button id="floating-chat" type="button" aria-label="Чат"><img src="chat.webp" alt=""></button>
<iframe id="store" src="store.html" title="Мобильная версия магазина"></iframe>
  <script>
    (() => {
      const frame = document.getElementById('store');
      const revealStore = () => document.body.classList.add('is-ready');
      const loaderFallback = window.setTimeout(revealStore, 3500);
      const hint = document.getElementById('header-hint');
      const header = document.getElementById('side-header');
      const grip = document.getElementById('side-grip');
      const maxOffset = 54;
      let dragging = false;
      let startX = 0;
      let startOffset = 0;
      const currentOffset = () => document.body.classList.contains('side-collapsed') ? maxOffset : 0;
      const setDraggedOffset = (offset) => {
        header.style.transform = `translateX(${offset}px)`;
        document.body.style.setProperty('--side-visible', `${64 - offset}px`);
      };
      const finishDrag = (offset) => {
        header.classList.remove('is-dragging');
        document.body.classList.remove('is-dragging');
        header.style.transform = '';
        document.body.style.removeProperty('--side-visible');
        document.body.classList.toggle('side-collapsed', offset > maxOffset / 2);
      };
      grip.addEventListener('pointerdown', (event) => {
        dragging = true;
        startX = event.clientX;
        startOffset = currentOffset();
        header.classList.add('is-dragging');
        document.body.classList.add('is-dragging');
        grip.setPointerCapture(event.pointerId);
        event.preventDefault();
      });
      grip.addEventListener('pointermove', (event) => {
        if (!dragging) return;
        setDraggedOffset(Math.max(0, Math.min(maxOffset, startOffset + event.clientX - startX)));
      });
      grip.addEventListener('pointerup', (event) => {
        if (!dragging) return;
        dragging = false;
        finishDrag(Math.max(0, Math.min(maxOffset, startOffset + event.clientX - startX)));
      });
      grip.addEventListener('pointercancel', () => {
        if (!dragging) return;
        dragging = false;
        finishDrag(currentOffset());
      });
      const ball = document.getElementById('floating-chat');
      const setChatOverlay = (isOpen) => ball.classList.toggle('is-hidden', isOpen);
      window.addEventListener('message', (event) => {
        if (event.data === 'store-header-ready') hint.remove();
        if (event.data === 'vnwr-overlay-open') setChatOverlay(true);
        if (event.data === 'vnwr-overlay-closed') setChatOverlay(false);
      });
      document.getElementById('side-search').addEventListener('click', () => { setChatOverlay(true); frame.contentWindow.postMessage('open-store-search', '*'); });
      let ballX = 0, ballY = 0, homeX = 0, homeY = 0, velocityX = 0, velocityY = 0, pointerX = 0, pointerY = 0, pointerTime = 0;
      let ballDragging = false, ballMoved = false, physicsFrame = 0;
      const ballSize = 58;
      const limits = () => ({ maxX: Math.max(0, window.innerWidth - ballSize), maxY: Math.max(0, window.innerHeight - ballSize) });
      const placeBall = () => { ball.style.left = `${ballX}px`; ball.style.top = `${ballY}px`; ball.style.right = 'auto'; ball.style.bottom = 'auto'; };
      const stopBall = () => { if (physicsFrame) cancelAnimationFrame(physicsFrame); physicsFrame = 0; };
      const bounceBall = () => {
        const { maxX, maxY } = limits();
        ballX += velocityX; ballY += velocityY;
        if (ballX <= 0 || ballX >= maxX) { ballX = Math.max(0, Math.min(maxX, ballX)); velocityX *= -.58; }
        if (ballY <= 0 || ballY >= maxY) { ballY = Math.max(0, Math.min(maxY, ballY)); velocityY *= -.58; velocityX *= .82; }
        velocityX *= .985; velocityY *= .985;
        placeBall();
        if (Math.abs(velocityY) < .08 && Math.abs(velocityX) < .08) { velocityX = 0; velocityY = 0; physicsFrame = 0; return; }
        physicsFrame = requestAnimationFrame(bounceBall);
      };
      const startBounce = () => { stopBall(); physicsFrame = requestAnimationFrame(bounceBall); };
      const setBallHome = () => { homeX = Math.max(0, window.innerWidth - ballSize - 18); homeY = Math.max(0, window.innerHeight - ballSize - 24); };
      const initializeBall = () => { setBallHome(); ballX = homeX; ballY = homeY; placeBall(); };
      const returnBall = () => { stopBall(); ball.classList.add('is-returning'); ballX = homeX; ballY = homeY; placeBall(); window.setTimeout(() => ball.classList.remove('is-returning'), 480); };
      requestAnimationFrame(initializeBall);
      ball.addEventListener('pointerdown', (event) => {
        stopBall(); ball.classList.remove('is-returning'); ballDragging = true; ballMoved = false; pointerX = event.clientX; pointerY = event.clientY; pointerTime = performance.now(); velocityX = 0; velocityY = 0;
        ball.classList.add('is-dragging'); ball.setPointerCapture(event.pointerId); event.preventDefault();
      });
      ball.addEventListener('pointermove', (event) => {
        if (!ballDragging) return;
        const now = performance.now(), deltaTime = Math.max(12, now - pointerTime), moveX = event.clientX - pointerX, moveY = event.clientY - pointerY;
        if (Math.abs(moveX) + Math.abs(moveY) > 1) ballMoved = true;
        const { maxX, maxY } = limits(); ballX = Math.max(0, Math.min(maxX, ballX + moveX)); ballY = Math.max(0, Math.min(maxY, ballY + moveY));
        velocityX = Math.max(-15, Math.min(15, moveX / deltaTime * 16)); velocityY = Math.max(-15, Math.min(15, moveY / deltaTime * 16));
        pointerX = event.clientX; pointerY = event.clientY; pointerTime = now; placeBall();
      });
      const releaseBall = (event) => {
        if (!ballDragging) return;
        ballDragging = false; ball.classList.remove('is-dragging'); if (ball.hasPointerCapture(event.pointerId)) ball.releasePointerCapture(event.pointerId);
        if (ballMoved) startBounce(); else returnBall();
      };
      ball.addEventListener('pointerup', releaseBall); ball.addEventListener('pointercancel', releaseBall);
      window.addEventListener('resize', () => { const { maxX, maxY } = limits(); setBallHome(); ballX = Math.min(maxX, ballX); ballY = Math.min(maxY, ballY); placeBall(); });
      frame.addEventListener('load', () => {
        const win = frame.contentWindow;
        const doc = frame.contentDocument;
        if (!win || !doc) return;

        win.open = () => null;
        doc.title = 'Магазин одежды';
        const localFixes = doc.createElement('style');
        localFixes.textContent = '.messenger-button,.messenger-frame{display:none!important}';
        doc.head.append(localFixes);
        const removeMessenger = () => doc.querySelectorAll('.messenger-button,.messenger-frame').forEach((node) => node.remove());
        removeMessenger();
        new MutationObserver(removeMessenger).observe(doc.documentElement, { childList: true, subtree: true });
        const syncChatWithOverlay = () => {
          const isOpen = Boolean(doc.querySelector('.store-modal.is-open,.vnwr-faq-modal.is-open,[role="dialog"][aria-modal="true"].is-open,.is-open [role="dialog"][aria-modal="true"]'));
          setChatOverlay(isOpen);
        };
        new MutationObserver(syncChatWithOverlay).observe(doc.documentElement, { attributes: true, subtree: true, attributeFilter: ['class', 'aria-hidden'] });
        syncChatWithOverlay();
        const brand = doc.querySelector('header.abbJwxTif > a');
        if (brand) {
          brand.style.visibility = 'hidden';
          brand.removeAttribute('href');
        }

        doc.addEventListener('click', (event) => {
          const link = event.target.closest && event.target.closest('a');
          const href = link && (link.getAttribute('href') || '');
          if (href && href !== '#' && !href.startsWith('#')) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        }, true);
        doc.addEventListener('submit', (event) => { event.preventDefault(); event.stopImmediatePropagation(); }, true);
        const images = Array.from(doc.images);
        const waitForImages = Promise.allSettled(images.map((image) => image.decode ? image.decode().catch(() => {}) : Promise.resolve()));
        Promise.race([waitForImages, new Promise((resolve) => setTimeout(resolve, 6000))]).then(() => { clearTimeout(loaderFallback); setTimeout(revealStore, 180); });
      });
    })();
  </script>
</body>
</html>
