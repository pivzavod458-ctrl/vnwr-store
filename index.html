        doc.addEventListener('touchmove', preventTouchZoom, { passive: false });
        doc.addEventListener('touchend', preventDoubleTapZoom, { passive: false });
        doc.addEventListener('dblclick', (event) => event.preventDefault(), { passive: false });
        doc.addEventListener('touchstart', preventTouchZoom, { capture: true, passive: false });
        doc.addEventListener('touchmove', preventTouchZoom, { capture: true, passive: false });
        revealWhenStable();
      });
    })();
  </script>
</body>
</html>
