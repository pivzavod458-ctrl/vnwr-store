    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{background:#fff;touch-action:pan-y}body,button,input,textarea,select{font-family:"Factor A",Arial,sans-serif!important}body{margin:0;background:#fff;color:#111;overscroll-behavior-y:none}.page-loader{position:fixed;z-index:100;inset:0;display:grid;place-items:center;background:#fff;transition:opacity .32s ease,visibility .32s step-end}.page-loader__mark{display:flex;height:30px;align-items:flex-end;gap:5px}.page-loader__mark i{display:block;width:5px;border-radius:4px;background:#222;animation:bar .72s ease-in-out infinite alternate}.page-loader__mark i:nth-child(1){height:13px;animation-delay:-.28s}.page-loader__mark i:nth-child(2){height:22px;animation-delay:-.14s}.page-loader__mark i:nth-child(3){height:30px}@keyframes bar{to{opacity:.55;transform:scaleY(.52)}}body.page-loading .reviews-shell{visibility:hidden}body.page-ready .page-loader{opacity:0;visibility:hidden;pointer-events:none}.reviews-shell{min-height:100vh;background:#fff}.reviews-header{position:sticky;z-index:5;top:0;display:flex;min-height:68px;align-items:center;justify-content:space-between;padding:10px 18px;background:rgba(255,255,255,.96);border-bottom:1px solid #eceef0;backdrop-filter:blur(12px)}.reviews-header__brand{display:flex;min-width:0;align-items:center;gap:9px;color:#111;text-decoration:none}.reviews-header__brand img{width:28px;height:28px;object-fit:contain}.reviews-header__copy{display:grid;gap:1px;min-width:0}.reviews-header__copy b{overflow:hidden;font-size:15px;font-weight:700;line-height:19px;text-overflow:ellipsis;white-space:nowrap}.reviews-header__copy span{color:#72777e;font-size:12px;line-height:16px}.reviews-back{display:flex;align-items:center;gap:5px;padding:8px 0 8px 12px;color:#222;font-size:14px;font-weight:500;line-height:20px;text-decoration:none}.reviews-back svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round;stroke-width:2}.reviews-page{width:min(100%,480px);margin:0 auto;padding:24px 16px 52px}.reviews-page h1{margin:0;font-size:27px;line-height:33px;letter-spacing:-.45px}.reviews-subtitle{margin:5px 0 18px;color:#72777e;font-size:15px;line-height:21px}.reviews-summary{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px;border-radius:17px;background:#f6f6f6}.reviews-score{display:grid;gap:6px}.reviews-score b{display:flex;align-items:center;gap:6px;color:#111;font-size:22px;line-height:27px}.reviews-score b svg{width:18px;height:17px;fill:#f0a353}.reviews-score span{color:#747a81;font-size:13px;line-height:18px}.reviews-avatars{display:flex;align-items:center;padding-right:3px}.reviews-avatars img,.reviews-avatars i{display:block;width:42px;height:42px;border:2px solid #f6f6f6;border-radius:12px;background:#e5e7e9;object-fit:cover}.reviews-avatars img+img{margin-left:-12px}.reviews-avatars i{display:grid;place-items:center;margin-left:-12px;background:#222;color:#fff;font-size:12px;font-style:normal;font-weight:500}.reviews-filters{display:flex;gap:8px;margin:16px 0;overflow-x:auto;scrollbar-width:none}.reviews-filters::-webkit-scrollbar{display:none}.reviews-filter{height:34px;flex:0 0 auto;padding:0 13px;border:0;border-radius:10px;background:#f3f4f5;color:#686e75;font-family:"Factor A",Arial,sans-serif!important;font-size:13px;font-weight:400;line-height:18px;cursor:pointer}.reviews-filter.is-active{background:#222;color:#fff}.reviews-list{display:grid;gap:10px}.review-card{padding:16px;border:1px solid #eceef0;border-radius:17px;background:#fff}.review-card[hidden]{display:none}.review-card__top{display:flex;align-items:center;justify-content:space-between;gap:12px}.review-author{display:grid;gap:2px}.review-author b{font-size:16px;line-height:21px}.review-author span{color:#7a8087;font-size:12px;line-height:16px}.review-stars{display:flex;gap:2px}.review-stars svg{width:14px;height:13px;fill:#f0a353}.review-card p{margin:12px 0 0;color:#333;font-size:15px;line-height:21px}.review-card__detail{display:block;margin-top:9px;color:#777d84;font-size:13px;line-height:18px}.review-card__photos{display:flex;gap:8px;margin-top:14px}.review-card__photos img{width:64px;height:64px;border-radius:12px;background:#f1f2f4;object-fit:cover}.review-empty{padding:24px 16px;border-radius:17px;background:#f6f6f6;color:#70767d;font-size:15px;line-height:21px;text-align:center}.leave-review{width:100%;height:52px;margin-top:18px;border:0;border-radius:13px;background:#111;color:#fff;font-size:16px;font-weight:500;cursor:pointer}.toast{position:fixed;z-index:30;top:max(18px,env(safe-area-inset-top));left:50%;max-width:calc(100% - 32px);padding:12px 15px;border-radius:12px;background:#222;color:#fff;font-size:14px;line-height:19px;opacity:0;pointer-events:none;transform:translate(-50%,-8px);transition:opacity .2s ease,transform .24s cubic-bezier(.2,.8,.2,1);white-space:nowrap}.toast.is-shown{opacity:1;transform:translate(-50%,0)}@media (min-width:600px){body{background:#383838}.reviews-shell{width:min(480px,100%);margin:0 auto}.reviews-header{width:min(480px,100%)}}
    .reviews-score b svg{display:block;transform:translateY(-1px)}.review-stars{align-items:center}.review-stars svg{display:block;transform:translateY(-.5px)}.reviews-page{padding-bottom:116px}.leave-review-bar{position:fixed;z-index:8;right:0;bottom:0;left:0;padding:10px 16px max(10px,env(safe-area-inset-bottom));border-top:1px solid #eceef0;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}.leave-review{display:flex;width:min(448px,100%);height:52px;align-items:center;justify-content:center;margin:0 auto}.toast{z-index:30}@media(max-width:599px){.reviews-header,.leave-review-bar{background:#fff;backdrop-filter:none;-webkit-backdrop-filter:none}}@media (min-width:600px){.leave-review-bar{width:min(480px,100%);right:auto;left:50%;transform:translateX(-50%)}}

<body class="page-loading">

  <script>
  (()=>{
    const started=performance.now(),minimum=1500;let revealed=false;const reveal=()=>{if(revealed)return;revealed=true;setTimeout(()=>requestAnimationFrame(()=>{document.body.classList.replace('page-loading','page-ready')}),Math.max(0,minimum-(performance.now()-started)))};
    const star='<svg viewBox="0 0 10 9" aria-hidden="true"><path d="M4.72.576a.313.313 0 0 1 .56 0L6.409 2.89c.047.096.14.161.246.173l2.642.297c.27.03.375.366.17.545L7.539 5.593a.312.312 0 0 0-.1.299l.515 2.456a.312.312 0 0 1-.452.34L5.146 7.441a.312.312 0 0 0-.292 0L2.499 8.688a.312.312 0 0 1-.452-.34l.515-2.456a.312.312 0 0 0-.1-.3L.533 3.905a.312.312 0 0 1 .171-.545l2.642-.297c.106-.012.199-.077.246-.173L4.72.576Z"></path></svg>';
    const data={mariners:{title:'Отзывы о PROJECT G/R MARINERS SS25 ZIP-HOODIE',rating:'4,8',count:'50',image:'wb-products/p_1.webp',extra:'catalog-icons/catalog-hoodies.webp',reviews:[['Алексей','Вчера, 18:40','Худи пришёл в отличном состоянии. Плотная ткань, посадка свободная — всё как хотел.','Размер M · рост 178 см'],['Мария','12 июля','Качественная вещь, цвет вживую ещё глубже. Заказом довольна.','Размер S · рост 164 см']]},interpol:{title:'Отзывы о PROJECT G/R INTERPOL INDEX HOODIE',rating:'5',count:'33',image:'wb-products/p_2.webp',extra:'catalog-icons/catalog-tracktops.webp',reviews:[['Кирилл','Сегодня, 12:15','Очень удобное худи. Объёмный силуэт смотрится круто, материал приятный.','Размер L · рост 184 см'],['Данил','10 июля','Всё подошло по размеру, получил быстро. Рекомендую.','Размер XL · рост 190 см']]} };
    const all={title:'Отзывы покупателей',rating:'4,9',count:'235',image:'wb-products/p_1.webp',extra:'wb-products/p_2.webp',reviews:[['Алексей','Вчера, 18:40','Худи пришёл в отличном состоянии. Плотная ткань, посадка свободная — всё как хотел.','PROJECT G/R MARINERS SS25 ZIP-HOODIE','wb-products/p_1.webp'],['Мария','12 июля','Качественная вещь, цвет вживую ещё глубже. Заказом довольна.','PROJECT G/R MARINERS SS25 ZIP-HOODIE','wb-products/p_1.webp'],['Кирилл','Сегодня, 12:15','Очень удобное худи. Объёмный силуэт смотрится круто, материал приятный.','PROJECT G/R INTERPOL INDEX HOODIE','wb-products/p_2.webp'],['Данил','10 июля','Всё подошло по размеру, получил быстро. Рекомендую.','PROJECT G/R INTERPOL INDEX HOODIE','wb-products/p_2.webp']]};
    const id=new URLSearchParams(location.search).get('id');const item=data[id]||all;const page=document.getElementById('reviews-page');document.title='VNWR — '+item.title;
    const reviewHasPhoto=(index)=>id?index===0:index===0||index===2;
    page.innerHTML='<h1>'+item.title+'</h1><p class="reviews-subtitle">Мнения покупателей о товарах VNWR</p><section class="reviews-summary"><div class="reviews-score"><b>'+star+item.rating+'</b><span>'+item.count+' оценок</span></div><div class="reviews-avatars"><img src="'+item.image+'" alt=""><img src="'+item.extra+'" alt=""><i>'+item.count+'+</i></div></section><div class="reviews-filters"><button class="reviews-filter is-active" type="button" data-filter="all">Все отзывы</button><button class="reviews-filter" type="button" data-filter="photo">С фото</button></div><section class="reviews-list">'+item.reviews.map((review,index)=>{const hasPhoto=reviewHasPhoto(index);const photo=review[4]||item.image;return '<article class="review-card" data-has-photo="'+(hasPhoto?'true':'false')+'"><div class="review-card__top"><div class="review-author"><b>'+review[0]+'</b><span>'+review[1]+'</span></div><span class="review-stars">'+star.repeat(5)+'</span></div><p>'+review[2]+'</p><span class="review-card__detail">'+review[3]+'</span>'+(hasPhoto?'<div class="review-card__photos"><img src="'+photo+'" alt="Фото отзыва"><img src="'+(review[4]||item.extra)+'" alt="Фото отзыва"></div>':'')+'</article>';}).join('')+'</section><div class="leave-review-bar"><button id="leave-review" class="leave-review" type="button">Оставить отзыв</button></div>';
    const filters=Array.from(page.querySelectorAll('.reviews-filter'));const cards=Array.from(page.querySelectorAll('.review-card'));filters.forEach(button=>button.addEventListener('click',()=>{filters.forEach(item=>item.classList.toggle('is-active',item===button));const photoOnly=button.dataset.filter==='photo';cards.forEach(card=>card.hidden=photoOnly&&card.dataset.hasPhoto!=='true')}));
    document.getElementById('leave-review').addEventListener('click',()=>{if(window.VNWRNotice)window.VNWRNotice.show('Вы не приобретали данный товар');});
    document.getElementById('reviews-back').href=id?'product.html?id='+id:'index.html';
    window.addEventListener('load',reveal,{once:true});setTimeout(reveal,4200);
  })();
  </script>
