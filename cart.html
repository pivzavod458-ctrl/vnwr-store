<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>VNWR — корзина</title>
  <style>
    @font-face{font-display:swap;font-family:"Factor A";font-style:normal;font-weight:400;src:url("factor-a-400.woff2") format("woff2")}
    @font-face{font-display:swap;font-family:"Factor A";font-style:normal;font-weight:500;src:url("factor-a-500.woff2") format("woff2")}
    @font-face{font-display:swap;font-family:"Factor A";font-style:normal;font-weight:700;src:url("factor-a-700.woff2") format("woff2")}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{background:#fff;touch-action:pan-y}
    body{margin:0;background:#fff;color:#111;font-family:"Factor A",Arial,sans-serif;overscroll-behavior-y:none}
    button,a{font:inherit}
    button:focus,a:focus{outline:0}
    .page-loader{position:fixed;z-index:100;inset:0;display:grid;place-items:center;background:#fff;opacity:1;visibility:visible;transition:opacity .34s ease,visibility .34s step-end}
    .page-loader__mark{display:flex;height:30px;align-items:flex-end;gap:5px}
    .page-loader__mark i{display:block;width:5px;border-radius:4px;background:#222;animation:loader-bar .72s ease-in-out infinite alternate}
    .page-loader__mark i:nth-child(1){height:13px;animation-delay:-.28s}.page-loader__mark i:nth-child(2){height:22px;animation-delay:-.14s}.page-loader__mark i:nth-child(3){height:30px}
    @keyframes loader-bar{to{opacity:.55;transform:scaleY(.52)}}
    body.page-loading .cart-shell{visibility:hidden}
    body.page-ready .page-loader{opacity:0;pointer-events:none;visibility:hidden}
    .cart-shell{width:min(480px,100%);min-height:100svh;margin:0 auto;background:#fff}
    .cart-header{position:sticky;z-index:5;top:0;display:flex;min-height:68px;align-items:center;justify-content:space-between;padding:10px 18px;background:rgba(255,255,255,.96);border-bottom:1px solid #eceef0;backdrop-filter:blur(12px)}
    .cart-header__brand{display:flex;min-width:0;align-items:center;gap:9px;color:#111;text-decoration:none}
    .cart-header__brand img{width:28px;height:28px;object-fit:contain}.cart-header__copy{display:grid;gap:1px;min-width:0}.cart-header__copy b{overflow:hidden;font-size:15px;line-height:19px;text-overflow:ellipsis;white-space:nowrap}.cart-header__copy span{color:#72777e;font-size:12px;line-height:16px}
    .cart-back{display:flex;align-items:center;gap:5px;padding:8px 0 8px 12px;color:#222;font-size:14px;font-weight:500;text-decoration:none}.cart-back svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-linecap:round;stroke-linejoin:round;stroke-width:2}
    .cart-main{padding:22px 16px 48px}.cart-main>h1{margin:0 0 20px;font-size:27px;line-height:34px;letter-spacing:-.4px}
    .cart-items{display:grid;gap:12px}
    .cart-item{position:relative;display:grid;grid-template-columns:108px minmax(0,1fr);gap:13px;padding:11px;border:0;border-radius:18px;background:#f6f6f6}
    .cart-item__image{display:block;width:108px;aspect-ratio:1/1;border-radius:14px;background:#eceef1;object-fit:cover}
    .cart-item__body{display:flex;min-width:0;flex-direction:column}.cart-item__name{display:-webkit-box;margin:1px 28px 0 0;overflow:hidden;color:#111;font-size:14px;font-weight:500;line-height:18px;text-decoration:none;-webkit-box-orient:vertical;-webkit-line-clamp:2}.cart-item__meta{margin-top:5px;color:#777c83;font-size:12px;line-height:16px}.cart-item__footer{display:flex;align-items:flex-end;justify-content:space-between;gap:8px;margin-top:auto}.cart-item__price{font-size:18px;font-weight:700;line-height:23px;letter-spacing:-.4px}
    .cart-item__remove{position:absolute;right:11px;top:11px;display:grid;width:28px;height:28px;place-items:center;padding:0;border:0;background:transparent;cursor:pointer}.cart-item__remove img{display:block;width:17px;height:17px;object-fit:contain;opacity:.58}
    .quantity{display:flex;width:max-content;align-items:center;gap:5px}.quantity button{display:grid;width:27px;height:27px;place-items:center;padding:0;border:0;background:transparent;color:#222;cursor:pointer;font-size:20px;font-weight:400;line-height:1}.quantity span{min-width:18px;text-align:center;font-size:13px;font-weight:500}
    .cart-summary{margin-top:18px;padding:18px;border-radius:17px;background:#f5f5f5}.cart-summary__row{display:flex;align-items:baseline;justify-content:space-between;gap:18px;font-size:16px;line-height:22px}.cart-summary__row b{font-size:22px;line-height:28px}.cart-checkout,.empty-shop{display:flex;width:100%;min-height:52px;align-items:center;justify-content:center;margin-top:16px;border:0;border-radius:12px;background:#000;color:#fff;cursor:pointer;font-size:15px;font-weight:500;text-decoration:none}
    .cart-empty{padding:34px 10px 18px;text-align:center}.cart-empty__icon{display:grid;width:68px;height:68px;place-items:center;margin:0 auto 18px;border-radius:20px;background:#f6f6f6}.cart-empty__icon svg{width:30px;height:30px;fill:none;stroke:#222;stroke-linecap:round;stroke-linejoin:round;stroke-width:1.6}.cart-empty h2{margin:0;font-size:24px;line-height:30px}.cart-empty p{margin:8px 0 0;color:#777c83;font-size:15px;line-height:21px}.empty-shop{max-width:300px;margin:22px auto 0}
    .related{margin-top:36px}.related h2{margin:0 0 14px;font-size:22px;line-height:28px}.related-rail{display:flex;gap:10px;margin:0 -16px;padding:0 16px 8px;overflow-x:auto;scroll-snap-type:x proximity;scrollbar-width:none}.related-rail::-webkit-scrollbar{display:none}.related-card{width:178px;min-width:178px;color:#111;text-decoration:none;scroll-snap-align:start}.related-card img{display:block;width:100%;aspect-ratio:1/1;border-radius:15px;background:#f1f2f4;object-fit:cover}.related-card__price{margin-top:8px;font-size:18px;font-weight:700;line-height:23px}.related-card__part{margin-left:6px;color:#686e76;font-size:12px;font-weight:500}.related-card__name{display:-webkit-box;margin-top:5px;overflow:hidden;font-size:13px;line-height:18px;-webkit-box-orient:vertical;-webkit-line-clamp:2}
    .toast{position:fixed;z-index:10;right:16px;bottom:24px;left:16px;width:fit-content;max-width:calc(100% - 32px);margin:auto;padding:12px 15px;border-radius:12px;background:#222;color:#fff;font-size:14px;line-height:19px;opacity:0;pointer-events:none;transform:translateY(8px);transition:opacity .2s ease,transform .25s cubic-bezier(.2,.8,.2,1)}.toast.is-shown{opacity:1;transform:translateY(0)}
    @media(min-width:600px){body{background:#383838}}
  </style>
</head>
<body class="page-loading">
  <div class="page-loader" aria-label="Загрузка"><span class="page-loader__mark" aria-hidden="true"><i></i><i></i><i></i></span></div>
  <div class="cart-shell">
    <header class="cart-header">
      <a class="cart-header__brand" href="index.html"><img src="tbank-icon.webp" alt=""><span class="cart-header__copy"><b>Долями — сервис Т-Банка:</b><span>Покупайте сейчас, платите частями.</span></span></a>
      <a class="cart-back" href="index.html"><svg viewBox="0 0 24 24"><path d="m14 6-6 6 6 6"></path></svg><span>Назад</span></a>
    </header>
    <main class="cart-main"><h1>Корзина</h1><div id="cart-content"></div><section class="related"><h2>Смотрите также</h2><div id="related-rail" class="related-rail"></div></section></main>
  </div>
  <div id="cart-toast" class="toast" role="status" aria-live="polite"></div>
  <script>
    (()=>{
      const products={mariners:{name:'PROJECT G/R MARINERS SS25 ZIP-HOODIE',image:'wb-products/p_1.webp',price:5500},interpol:{name:'PROJECT G/R INTERPOL INDEX HOODIE',image:'wb-products/p_2.webp',price:5500}};
      const cartKey='vnwr-cart-v1';
      const format=(value)=>String(value).replace(/\B(?=(\d{3})+(?!\d))/g,' ');
      const readCart=()=>{try{const value=JSON.parse(localStorage.getItem(cartKey)||'[]');return Array.isArray(value)?value:[];}catch(error){return [];}};
      const saveCart=(cart)=>localStorage.setItem(cartKey,JSON.stringify(cart));
      const content=document.getElementById('cart-content');
      const toast=document.getElementById('cart-toast');let toastTimer;
      const showToast=(text)=>{toast.textContent=text;toast.classList.add('is-shown');clearTimeout(toastTimer);toastTimer=setTimeout(()=>toast.classList.remove('is-shown'),2200);};
      const renderRelated=()=>{document.getElementById('related-rail').innerHTML=Object.entries(products).map(([id,product])=>`<a class="related-card" href="product.html?id=${id}"><img src="${product.image}" alt="${product.name}" loading="eager"><div class="related-card__price">${format(product.price)}₽<span class="related-card__part">${format(Math.round(product.price/4))}₽ × 4</span></div><div class="related-card__name">${product.name}</div></a>`).join('');};
      const renderCart=()=>{
        const cart=readCart().filter((item)=>products[item.id]&&item.quantity>0);
        saveCart(cart);
        if(!cart.length){content.innerHTML='<section class="cart-empty"><div class="cart-empty__icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 5h2l1.5 9a2 2 0 0 0 2 1.7h8a2 2 0 0 0 1.9-1.4L20.5 9H6.2"></path><circle cx="10" cy="19" r="1.3"></circle><circle cx="17" cy="19" r="1.3"></circle></svg></div><h2>Корзина пуста</h2><p>Добавьте товары — они появятся здесь.</p><a class="empty-shop" href="index.html#products">За покупками</a></section>';return;}
        const total=cart.reduce((sum,item)=>sum+products[item.id].price*item.quantity,0);
        content.innerHTML='<div class="cart-items">'+cart.map((item,index)=>{const product=products[item.id];return `<article class="cart-item"><img class="cart-item__image" src="${product.image}" alt="${product.name}"><div class="cart-item__body"><a class="cart-item__name" href="product.html?id=${item.id}">${product.name}</a><div class="cart-item__meta">Размер: ${item.size}</div><div class="cart-item__footer"><div class="cart-item__price">${format(product.price*item.quantity)}₽</div><div class="quantity"><button type="button" data-action="minus" data-index="${index}" aria-label="Уменьшить">−</button><span>${item.quantity}</span><button type="button" data-action="plus" data-index="${index}" aria-label="Увеличить">+</button></div></div></div><button class="cart-item__remove" type="button" data-action="remove" data-index="${index}" aria-label="Удалить товар"><img src="delete.webp" alt=""></button></article>`;}).join('')+'</div><section class="cart-summary"><div class="cart-summary__row"><span>Итого</span><b>'+format(total)+'₽</b></div><button class="cart-checkout" type="button">Оформить заказ</button></section>';
        content.querySelectorAll('[data-action]').forEach((button)=>button.addEventListener('click',()=>{const current=readCart();const index=Number(button.dataset.index);if(!current[index])return;if(button.dataset.action==='plus')current[index].quantity=Math.min(99,(current[index].quantity||1)+1);if(button.dataset.action==='minus')current[index].quantity=Math.max(1,(current[index].quantity||1)-1);if(button.dataset.action==='remove')current.splice(index,1);saveCart(current);renderCart();}));
        content.querySelector('.cart-checkout')?.addEventListener('click',()=>showToast('Оформление заказа добавим следующим шагом.'));
      };
      renderRelated();renderCart();
      let pageShown=false;const reveal=()=>{if(pageShown)return;pageShown=true;document.body.classList.remove('page-loading');document.body.classList.add('page-ready');};window.addEventListener('load',()=>setTimeout(reveal,100),{once:true});setTimeout(reveal,2600);
      const stopZoom=(event)=>{if((event.ctrlKey||event.metaKey)&&(event.type==='wheel'||['+','-','=','0'].includes(event.key)))event.preventDefault();};window.addEventListener('wheel',stopZoom,{passive:false});window.addEventListener('keydown',stopZoom);document.addEventListener('dblclick',(event)=>event.preventDefault(),{passive:false});document.addEventListener('touchmove',(event)=>{if(event.touches.length>1)event.preventDefault()},{passive:false});
    })();
  </script>
</body>
</html>
